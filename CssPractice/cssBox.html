<!DOCTYPE html>
<html>
<!-- 設定網頁的資訊-->
<head>
    <meta charset="utf-8"/>
    <title>CSS BOX MODEL 練習</title>
</head>
<body style="background-color:#cccccc;"> <!-- 淺灰 -->
<div style="margin-bottom: 10px ; font-weight: bold ; font-size: 24px"> 文章第一段落的標題 </div> <!-- margin-bottom: 10px 讓區塊間留出空間-->
<div style="width: 400px ; padding: 10px ; border:1px dashed blue ; color: #444444"> <!-- style="border:1px dashed blue  為方塊邊框線寬度1px 虛線 藍色 ， padding: 10px  讓字跟邊框有空間一點-->

    今天<span style="color: red">天氣</span>真不錯
    <div style="background-color: yellow"> 測試</div>
    <br/>更多行<br/> 更多行 <br/>更多行
    <!-- 不要設定高度是最好的 因為高度會被固定 之後文字就容易跑出去 版面就有很大的機會變醜-->
</div>




</body>
</html>
