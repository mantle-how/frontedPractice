<!DOCTYPE html>
<html>
<!-- 設定網頁的資訊-->
<head>
    <meta charset="utf-8"/>
    <title>CSS 的基本練習</title>
</head>
<body style="background-color:#cccccc;"> <!-- 淺灰 -->
    <div style="font-weight: bold ; font-size: 24px"> 文章第一段落的標題 </div> <!-- text-decoration: underline， 為加個底線 font-weight: bold 為文字變粗體  -->
    <div style="color: #444444">

        今天<span style="color: red">天氣</span>真不錯

    </div> <!-- 深灰  有需要的時候用標籤包住， 因為我們需要套css ，利用span 文字就不會自動換行。 display:none 將標籤隱藏起來-->






</body>
</html>
