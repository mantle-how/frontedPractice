<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- 控制網頁的縮放 不要亂縮放 常用-->
        <meta charset="utf-8"/>
        <title>JavaScript資料 資料型態</title>
    </head>
    <body>
        <script>
            // 資料
            // 數字
            3;
            3.14;
            -5;

            //字串 任意的文字
            "Hello";
            "你好";

            // 布林值
            true;
            false;

            // 空值
            undefined;
            null;

            // 在 console中 印出資料 : console.log (資料)
            console.log("Hello JavaScript");
            console.log(16);
            console.log(false);
            console.log("xyz");

        </script>
    </body>
</html>
