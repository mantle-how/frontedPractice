<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- 控制網頁的縮放 不要亂縮放 常用-->
        <meta charset="utf-8"/>
        <title>JavaScript HTML DOM 核心觀念</title>
    </head>
<body>
        <script>
            //認識內建的window物件  (html dom 結構的最上層)
            console.log(window);
            //取的視窗的高度跟寬度
            console.log(window.innerWidth,window.innerHeight);
            //透過screen 物件 ， 取得螢幕尺寸
            console.log(window.screen.width, window.screen.height);
            //取得網址列的內容
            console.log(window.location.href);
            //更改網址列的內容 (跳轉網頁)
            // window.location.href = "https://www.google.com/";
            //認識document物件
            console.log(window.document);
            console.dir(document);
            //取得網頁標題
            console.log(document.title);
            //更改網頁標題
            document.title = 'JavaScript 新的標題';
            //取得body標籤
            console.log(document.body);
            // 更改網業主畫面內容 (body標籤的內文)
            console.log(document.body.innerHTML);
            document.body.innerHTML = "hello html dom!!!"

        </script>
    </body>
</html>
