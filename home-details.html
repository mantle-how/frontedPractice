<!DOCTYPE html>
<html>
<!-- 設定網頁的資訊-->
    <head>
        <meta charset="utf-8"/>
        <title>我的首頁</title>
    </head>
    <body>
        <h2>我的個人資訊</h2>

        <!-- 設定超連結-->
        <a href="https://www.google.com/">Google</a>
        <a href="https://www.yahoo.com/">Yahoo</a>
        <!-- 設定顯示圖片-->
        <img src="https://yt3.ggpht.com/6JKwgqruduKvuXmcL3g0imdhi6-eTj5CNgP_GlsL7VPeHfc8lSNJX3LkYep-w91dLC-zbhR9i5g=s88-c-k-c0x00ffffff-no-rj"/>  <!-- src => 設定圖片檔案位置 目前這邊src是設定成網址方式設定-->
        <img src="wtf-barbie.png"/> <!-- src => 設定圖片檔案位置 目前這邊src是設定成路徑-->

        <hr/>
        <h2> 我的最愛 </h2>
        <!-- 列表開頭為圓圈  要數字為<ol>-->
        <ul>
            <li><a href="https://www.google.com/">Google</a></li>
            <li>FaceBook</li>
        </ul>
        <!-- 表格練習-->
        <3*3表格>
        <table border="1" width="300" cellpadding="10"> <!-- border為屬性 意思是表格格線寬度 ，width為表格寬度，cellpadding文字與線的距離，但都不推薦用-->
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
            </tr>
            <tr>
                <td>7</td>
                <td>8</td>
                <td>9</td>
            </tr>
        </table>


    </body>
</html>
